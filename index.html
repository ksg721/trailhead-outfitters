<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPS Trailhead Outfitters</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <script src="/src/js/main.js" type="module" defer></script>
    <script src="src/js/cart.js" type="module" defer></script>
  </head>
  <body class="page">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <header class="site-header">
      <nav class="site-nav" aria-label="Main navigation">
        <a class="brand" href="index.html">Trailhead Outfitters</a>
        <button
          type="button"
          id="cart-counter"
          class="order-counter"
          aria-label="Open shopping cart"
          aria-haspopup="dialog"
          aria-controls="cart-modal"
          aria-expanded="false"
        >🛒 Cart: 0 items</button>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <p class="hero-tag">Gear Up</p>
        <h1>National Parks Trailhead Outfitters</h1>
      </div>
    </section>

    <main class="page-main" id="main-content">
      <div class="filter-controls" aria-label="Product Filters">
        <input
          type="search"
          id="search-input"
          placeholder="Search gear (e.g., tent, boots)..."
          aria-label="Search products"
        />

        <select id="category-filter" aria-label="Filter by category">
          <option value="all">All Categories</option>
          <option value="Camping">Camping</option>
          <option value="Hiking">Hiking</option>
          <option value="Tools">Tools</option>
        </select>
      </div>

      <section
        id="product-list-container"
        class="product-grid"
        aria-label="Products"
      >
        <p class="loading-msg">Loading outdoor gear...</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <a class="brand" href="index.html">Trailhead Outfitters</a>
        <a href="design-doc.html">Design Document</a>
      </div>
      <p>&copy; 2026 Kyle Green. All rights reserved.</p>
    </footer>
  </body>
</html>
