<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | NPS Trailhead Outfitters</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <script src="src/js/detail.js" type="module" defer></script>
  </head>
  <body class="page">
    <header class="site-header">
      <nav class="site-nav" aria-label="Main navigation">
        <a class="brand" href="index.html">Trailhead Outfitters</a>
        <a
          href="cart.html"
          id="cart-counter"
          class="order-counter"
          style="text-decoration: none"
          >🛒 Cart: 0 items</a
        >
      </nav>
    </header>

    <main class="page-main">
      <section id="detail-view-container" aria-label="Product Showcase">
        <p class="loading-msg">Loading gear details...</p>
      </section>

      <section
        id="order-form-container"
        class="order-form-section hidden"
        aria-label="Order Placement Form"
      >
        <h2>Place Your Order</h2>
        <form id="checkout-form" novalidate>
          <div class="form-group">
            <label for="user-name">Full Name *</label>
            <input
              type="text"
              id="user-name"
              name="name"
              required
              placeholder="John Doe"
            />
          </div>

          <div class="form-group">
            <label for="user-email">Email Address *</label>
            <input
              type="email"
              id="user-email"
              name="email"
              required
              placeholder="john@example.com"
            />
          </div>

          <div class="form-group">
            <label for="user-phone">Phone Number</label>
            <input
              type="tel"
              id="user-phone"
              name="phone"
              placeholder="123-456-7890"
            />
          </div>

          <div class="form-group">
            <label for="user-address">Shipping Address *</label>
            <input
              type="text"
              id="user-address"
              name="address"
              required
              placeholder="123 Trailhead Way, Rexburg, ID"
            />
          </div>

          <div class="form-group">
            <label for="user-message"
              >Special Instructions / Optional Message</label
            >
            <textarea
              id="user-message"
              name="message"
              rows="4"
              placeholder="Any specific requirements..."
            ></textarea>
          </div>

          <button type="submit" class="btn submit-btn">Submit Order</button>
        </form>
      </section>

      <section
        id="confirmation-msg"
        class="confirmation-container hidden"
        aria-label="Order Confirmation"
      ></section>
    </main>

    <footer class="site-footer">
      <div class="footer-content">
        <a class="brand" href="index.html">Trailhead Outfitters</a>
        <a href="design-doc.html">Design Document</a>
      </div>
      <p>&copy; 2026 Kyle Green. All rights reserved.</p>
    </footer>
  </body>
</html>
